<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity Dashboard</title>
 <link rel="shortcut icon" href="./android-chrome-192x192.png" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  
 <div id="main">
  <section class="allelem">
   <header>
    <div class="header1">
      <h2></h2>
     <h1></h1>
     <h3>Katihar (BR)</h3>
    </div>
    <div class="header2">
       <h1></h1>
       <h4></h4>
      <h3 class="heatindex"></h3>
      <h3 class="Humidity"></h3>
      <h3 class="Wind"></h3>
    </div>
   </header>
   
   <div class="allfeature">
     <div class="todo elem" id="0">
      <img src="https://plus.unsplash.com/premium_photo-1679826780158-bef9a5b575b6?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8cGVufGVufDB8fDB8fHww" alt="">
     <h3> To Do List</h3>
    </div>
    <div class="daily elem" id="1">
      <img src="https://plus.unsplash.com/premium_photo-1679826780195-1076f8e6196b?q=80&w=627&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
      <h3>Daily Planner</h3>
    </div>
    <div class="moti elem" id="2">
      <img src="https://plus.unsplash.com/premium_photo-1679826780130-f760fcb26941?q=80&w=627&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
      <h3>Motivation</h3>
    </div>
    <div class="pomo elem" id="3">
      <img src="./ChatGPT Image Feb 15, 2026, 07_37_23 PM.png" alt="">
      <h3>Pomodoro Timer</h3>
    </div>
   </div>

  </section>
  <section class="fullelem todofullpage">
    <button class="back" id="0">Back</button>
    <h2>Your Personalised Task List</h2>
    <div class="todo-conatainer">
      <div class="addtask">
        <form>
          <input id="task-inp" type="text" placeholder="Add Task">
          <textarea class="details" placeholder="Add Details......"></textarea>
          <div class="imp">
            <input type="checkbox" name="" id="check">
            <label for="check">Mark As Important!</label>
          </div>
          <button type="submit">Add Task</button>
        </form>
      </div>
      <div class="alltask">
      </div>
    </div>
  </section>
  <section class="fullelem plannerfullpage">
    <button class="back" id="1">Back</button>
    <h2>Plain Your Day To Be More Productive</h2>
    
    <button class="clear-planner">
      🗑 Reset Day
    </button>

    <div class="dayplanner"></div>

  </section>
  <section class="fullelem motivationfullpage">
    <button class="back" id="2">Back</button>
    <h2>Motivation</h2>
    
    <div class="motivational-container">
      <div class="motivational-wrapper">
        <img src="./icons8-quotes-100.png" alt="">
        <div class="mv">
          <h2></h2>
        </div>
      </div>
    </div>
    <button class="next-quote-btn">&#8594;</button>

  </section>
  <section class="fullelem timerfullpage">
    <button class="back" id="3">Back</button>
    <h2>Study with me!</h2>
  <div class="session">
  <span class="session-icon">🍅</span>
  <h3 class="session-text">Work Session</h3>
</div>
    <div class="pomo-timer">
      <h2>25:00</h2>
      <button class="start">start</button>
      <button class="Pause">Pause</button>
      <button class="reset">Reset</button>
    <p class="focus-tip">
  Stay focused. One session at a time.
</p>
    </div>
  </section>
 </div>

   <script src="script.js"></script>
</body>
</html>
